name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check daemon
        run: cargo check -p nylon-wall-daemon

      - name: Check UI (wasm)
        run: cargo check -p nylon-wall-ui --target wasm32-unknown-unknown

      - name: Clippy
        run: cargo clippy -p nylon-wall-common -p nylon-wall-daemon -- -D warnings
