services:
  daemon:
    build:
      context: .
      dockerfile: Dockerfile.daemon
    ports:
      - "9450:9450"
    volumes:
      - slatedb-data:/tmp/nylon-wall/slatedb
    environment:
      - RUST_LOG=nylon_wall_daemon=debug
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: nylon-wall-daemon/src
        - action: rebuild
          path: nylon-wall-common/src

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8080:8080"
    depends_on:
      - daemon
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: nylon-wall-ui/src
        - action: rebuild
          path: nylon-wall-ui/assets
        - action: rebuild
          path: nylon-wall-common/src

volumes:
  slatedb-data:
