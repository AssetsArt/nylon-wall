[application]
name = "nylon-wall-ui"
default_platform = "web"
out_dir = "dist"
asset_dir = "assets"

[web.app]
title = "Nylon Wall - Network Firewall"

[web.watcher]
reload_html = true
watch_path = ["src", "assets"]

# API proxy no longer needed — UI calls daemon directly via window.__NYLON_API_URL__
# Set the API URL in index.html or config.toml [ui].api_url
